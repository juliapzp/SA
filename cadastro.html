<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Home-Page</title>
</head>

<body>
    <div class="container">
                <br><h3>Não é usuário ainda?</h3>
                <h3>Faça seu cadastro!</h3><br>
                <input type="text" placeholder="Digite seu login" id="novoLogin"><br>
                <input type="text" placeholder="Digite seu nome completo" id="novoNome"><br>
                <input type="text" placeholder="Digite seu CPF" id="novoCPF"><br>
                <input type="password" placeholder="Digite sua senha" id="novaSenha"><br>
                <input type="password" placeholder="Repita sua senha" id="repSenha"><br>
                <button onclick="cadastra()">Cadastrar</button><br>
                <button onclick="voltarLogin()">Voltar para Login</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
